<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Wine Classifier — MLOps</title>
<style>
  :root{
    --bg:#0A0A0A; --panel:#15171C; --border:#2A2E37;
    --text:#F2F3F5; --muted:#9BA1A9; --accent:#5B9DF9; --neg:#E0705B;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);
    font-family:"Segoe UI",system-ui,Arial,sans-serif;line-height:1.4}
  .wrap{max-width:1100px;margin:0 auto;padding:28px 20px 60px}
  header{display:flex;align-items:baseline;justify-content:space-between;
    gap:16px;border-bottom:1px solid var(--border);padding-bottom:16px;margin-bottom:24px}
  h1{font-size:22px;margin:0;font-weight:600}
  h1 .sub{display:block;font-size:13px;color:var(--muted);font-weight:400;margin-top:4px}
  .rule{width:44px;height:3px;background:var(--accent);margin:10px 0 0}
  .dot{font-size:12px;color:var(--muted);white-space:nowrap}
  .dot b{display:inline-block;width:8px;height:8px;border-radius:50%;background:#555;margin-right:6px}
  .dot.ok b{background:#4ADE80}.dot.bad b{background:var(--neg)}
  .cols{display:grid;grid-template-columns:1fr 1fr;gap:22px}
  @media(max-width:820px){.cols{grid-template-columns:1fr}}
  .panel{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:18px}
  .panel h2{font-size:13px;text-transform:uppercase;letter-spacing:.06em;
    color:var(--muted);margin:0 0 14px;font-weight:600}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 14px}
  label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px}
  input{width:100%;background:#0E1014;border:1px solid var(--border);color:var(--text);
    border-radius:6px;padding:7px 9px;font-size:13px;font-family:inherit}
  input:focus{outline:none;border-color:var(--accent)}
  .presets{display:flex;flex-wrap:wrap;gap:8px;margin:16px 0 6px}
  button{background:transparent;border:1px solid var(--border);color:var(--text);
    border-radius:6px;padding:8px 12px;font-size:13px;cursor:pointer;font-family:inherit}
  button:hover{border-color:var(--accent)}
  button.primary{background:var(--accent);border-color:var(--accent);color:#04122e;
    font-weight:600;width:100%;margin-top:8px;padding:11px}
  .result{min-height:60px}
  .pred{font-size:15px;color:var(--muted)}
  .pred b{font-size:30px;color:var(--text);display:block;margin-top:2px}
  .proba{margin-top:14px;display:grid;gap:8px}
  .pb{display:grid;grid-template-columns:60px 1fr 46px;align-items:center;gap:10px;font-size:12px;color:var(--muted)}
  .track{height:8px;background:#0E1014;border-radius:6px;overflow:hidden}
  .fill{height:100%;background:var(--accent)}
  .muted{color:var(--muted);font-size:12px}
  .imgs{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:8px}
  @media(max-width:820px){.imgs{grid-template-columns:1fr}}
  .imgs figure{margin:0}
  .imgs img{width:100%;border:1px solid var(--border);border-radius:8px;background:#fff}
  .imgs figcaption{font-size:12px;color:var(--muted);margin-top:6px}
  .full{grid-column:1/-1}
  svg text{fill:var(--muted);font-size:11px}
  .empty{color:var(--muted);font-size:13px;padding:18px 0}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Wine Classifier
      <span class="sub">Predicción y explicabilidad servidas desde el modelo <code>@champion</code> del registro MLflow</span>
      <div class="rule"></div>
    </h1>
    <div id="health" class="dot"><b></b>comprobando…</div>
  </header>

  <div class="cols">
    <section class="panel">
      <h2>Entrada — características del vino</h2>
      <div class="presets">
        <span class="muted" style="align-self:center">Ejemplos reales:</span>
        <button onclick="loadExample(0)">Clase 0</button>
        <button onclick="loadExample(1)">Clase 1</button>
        <button onclick="loadExample(2)">Clase 2</button>
      </div>
      <div id="form" class="grid"></div>
      <button class="primary" onclick="run()">Predecir y explicar</button>
    </section>

    <section class="panel">
      <h2>Resultado</h2>
      <div id="result" class="result"><div class="empty">Carga un ejemplo y pulsa «Predecir y explicar».</div></div>
    </section>
  </div>

  <section class="panel full" style="margin-top:22px">
    <h2>Explicabilidad global del modelo (generada por el pipeline)</h2>
    <div class="imgs">
      <figure>
        <img src="/reports/shap_summary.png" alt="SHAP summary"
             onerror="this.parentNode.style.display='none'">
        <figcaption>Importancia de features (SHAP) — qué pesa en las decisiones del modelo.</figcaption>
      </figure>
      <figure>
        <img src="/reports/confusion_matrix.png" alt="Confusion matrix"
             onerror="this.parentNode.style.display='none'">
        <figcaption>Matriz de confusión sobre el conjunto de prueba.</figcaption>
      </figure>
    </div>
  </section>
</div>

<script>
const FEATURES = [
  ["alcohol","Alcohol"],["malic_acid","Ácido málico"],["ash","Ceniza"],
  ["alcalinity_of_ash","Alcalinidad de la ceniza"],["magnesium","Magnesio"],
  ["total_phenols","Fenoles totales"],["flavanoids","Flavonoides"],
  ["nonflavanoid_phenols","Fenoles no flavonoides"],["proanthocyanins","Proantocianinas"],
  ["color_intensity","Intensidad de color"],["hue","Tono (hue)"],
  ["od280_od315_of_diluted_wines","OD280/OD315"],["proline","Prolina"],
];

const formEl = document.getElementById("form");
FEATURES.forEach(([k,label])=>{
  const d=document.createElement("div");
  d.innerHTML=`<label for="${k}">${label}</label><input id="${k}" type="number" step="any">`;
  formEl.appendChild(d);
});

async function health(){
  const el=document.getElementById("health");
  try{
    const h=await (await fetch("/health")).json();
    if(h.model_loaded){el.className="dot ok";el.innerHTML="<b></b>modelo cargado · "+h.model_uri;}
    else{el.className="dot bad";el.innerHTML="<b></b>modelo no cargado";}
  }catch(e){el.className="dot bad";el.innerHTML="<b></b>API no disponible";}
}

async function loadExample(n){
  try{
    const ex=await (await fetch("/example/"+n)).json();
    FEATURES.forEach(([k])=>{ if(k in ex) document.getElementById(k).value=ex[k]; });
  }catch(e){ alert("No se pudo cargar el ejemplo"); }
}

function readSample(){
  const s={};
  for(const [k] of FEATURES){
    const v=parseFloat(document.getElementById(k).value);
    if(Number.isNaN(v)) return null;
    s[k]=v;
  }
  return s;
}

async function run(){
  const sample=readSample();
  const res=document.getElementById("result");
  if(!sample){res.innerHTML='<div class="empty">Completa todos los campos (o carga un ejemplo).</div>';return;}
  res.innerHTML='<div class="empty">Calculando…</div>';
  try{
    const r=await fetch("/explain",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(sample)});
    if(!r.ok) throw new Error(await r.text());
    render(await r.json());
  }catch(e){ res.innerHTML='<div class="empty">Error: '+e.message+'</div>'; }
}

function render(data){
  const probaRows=data.probabilities.map((p,i)=>`
    <div class="pb"><span>Clase ${i}</span>
      <span class="track"><span class="fill" style="width:${(p*100).toFixed(1)}%"></span></span>
      <span>${(p*100).toFixed(1)}%</span></div>`).join("");
  const top=data.contributions.slice(0,10);
  document.getElementById("result").innerHTML=`
    <div class="pred">Clase predicha <b>Clase ${data.prediction}</b></div>
    <div class="proba">${probaRows}</div>
    <h2 style="margin-top:20px">Por qué esta predicción (SHAP local)</h2>
    ${barsSVG(top)}
    <p class="muted">Azul empuja hacia la clase predicha; rojo, en contra. Top 10 de 13 features.</p>`;
}

function barsSVG(items){
  const W=460,rowH=24,padL=150,padR=44,mid=(padL+(W-padR))/2;
  const H=items.length*rowH+8, maxAbs=Math.max(...items.map(c=>Math.abs(c.shap)),1e-9);
  const half=(W-padR-padL)/2;
  let rows="";
  items.forEach((c,i)=>{
    const y=i*rowH+4, w=Math.abs(c.shap)/maxAbs*half, pos=c.shap>=0;
    const x=pos?mid:mid-w, fill=pos?"#5B9DF9":"#E0705B";
    rows+=`<text x="${padL-8}" y="${y+15}" text-anchor="end">${c.feature.replace(/_/g," ").slice(0,20)}</text>
      <rect x="${x}" y="${y+4}" width="${Math.max(w,0.6)}" height="12" rx="2" fill="${fill}"></rect>
      <text x="${W-padR+6}" y="${y+15}">${c.shap>=0?"+":""}${c.shap.toFixed(3)}</text>`;
  });
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" role="img">
    <line x1="${mid}" y1="0" x2="${mid}" y2="${H}" stroke="#2A2E37"></line>${rows}</svg>`;
}

health(); loadExample(0);
</script>
</body>
</html>
