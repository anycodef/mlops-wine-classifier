name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  reproduce-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Reproduce the DVC pipeline
        run: dvc repro

      - name: Run unit tests
        run: pytest -q
